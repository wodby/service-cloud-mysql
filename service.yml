name: cloud-mysql
type: db
title: Cloud MySQL
external: true
options:
- version: 5.5
- version: 5.6
- version: 5.7
- version: 8
env:
- name: DB_USER
  value: '{{wodby_app_name}}_{{wodby_app_instance_name}}'
- name: DB_PASSWORD
  value: '{{password}}'
  secret: true
- name: DB_NAME
  value: '{{wodby_app_name}}_{{wodby_app_instance_name}}'
- name: DB_DRIVER
  value: mysql
labels:
- mysql
database:
  type: mysql
  db:
    name: '{{wodby_app_name}}_{{wodby_app_instance_name}}'
    charset: 'utf8mb4'
    collation: 'utf8_general_ci'    
  user:
    name: '{{wodby_app_name}}_{{wodby_app_instance_name}}'
    password: '{{password}}'
tokens:
- name: password
  generate:
    regex: '[0-9a-z-]{32}'
